# HTTP vhost for ASD system (Windows Nginx)
# Place this file in: C:/nginx/conf/sites-enabled/asd.rbxcrew.com.conf

server {
    listen 80;
    server_name asd.rbxcrew.com;

    root C:/sites/asd-frontend;
    index index.html;

    # SPA fallback (React/Vite)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Spring Boot REST API
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring websocket endpoint used in BookingChat.jsx
    location /ws-chat {
        proxy_pass http://127.0.0.1:8081/ws-chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    # Optional static uploads through backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:8081/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 25M;
}

